name: Cross-Version Duplicate Analysis

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub repository URL to analyze'
        required: true
        type: string
        default: 'https://github.com/apache/calcite.git'

      tag_regex:
        description: 'Regex for version tags (e.g., "calcite-[0-9]+\.[0-9]+\.[0-9]+(-incubating)?$")'
        required: true
        type: string
        default: 'calcite-[0-9]+\.[0-9]+\.[0-9]+(-incubating)?$'

      max_versions:
        description: 'Maximum versions to process (0 = all)'
        required: false
        default: '0'
        type: string

      base_model_run_id:
        description: 'Run ID from base model workflow (find in URL: .../actions/runs/[RUN_ID])'
        required: true
        type: string

      base_model_artifact:
        description: 'Name of the base model artifact'
        required: true
        default: 'base-model-java'
        type: string

      file_extensions:
        description: 'File extensions (space-separated, e.g., ".java .scala")'
        required: true
        default: '.java'
        type: string

      finetune_epochs:
        description: 'Number of fine-tuning epochs'
        required: false
        default: '10'
        type: string

      update_vocab:
        description: 'Update vocabulary with new words from target repo'
        required: false
        default: true
        type: boolean

      duplicate_threshold:
        description: 'Cosine similarity threshold for duplicate detection'
        required: false
        default: '0.99'
        type: string

jobs:
  cross-version-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download base model artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ./base_model
          gh run download ${{ github.event.inputs.base_model_run_id }} \
            -R ${{ github.repository }} \
            -n ${{ github.event.inputs.base_model_artifact }} \
            -D ./base_model

      - name: List downloaded files
        run: |
          echo "Base model files:"
          ls -la ./base_model/

      - name: Extract repository name
        id: repo_name
        run: |
          REPO_NAME=$(echo "${{ github.event.inputs.repo_url }}" | sed 's|.*/||; s|\.git$||')
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "Repository name: ${REPO_NAME}"

      - name: Setup swap space
        run: |
          echo "Setting up additional swap space..."
          sudo fallocate -l 8G /swapfile2
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          sudo swapon --show

      - name: Run cross-version analysis
        run: |
          BASE_MODEL=$(find ./base_model -name "*.d2v" | head -1)
          echo "Using base model: $BASE_MODEL"

          VOCAB_FLAG=""
          if [ "${{ github.event.inputs.update_vocab }}" = "false" ]; then
            VOCAB_FLAG="--no-vocab-update"
          fi

          MAX_VER_FLAG=""
          if [ "${{ github.event.inputs.max_versions }}" != "0" ]; then
            MAX_VER_FLAG="--max-versions ${{ github.event.inputs.max_versions }}"
          fi

          python src/cross_version_pipeline.py \
            --repo "${{ github.event.inputs.repo_url }}" \
            --base-model "$BASE_MODEL" \
            --tag-regex "${{ github.event.inputs.tag_regex }}" \
            --ext ${{ github.event.inputs.file_extensions }} \
            --output "${{ steps.repo_name.outputs.repo_name }}" \
            --epochs ${{ github.event.inputs.finetune_epochs }} \
            --threshold ${{ github.event.inputs.duplicate_threshold }} \
            $VOCAB_FLAG $MAX_VER_FLAG

      - name: Write Job Summary
        if: always()
        run: |
          METADATA_FILE="${{ steps.repo_name.outputs.repo_name }}_cross_version_metadata.json"

          if [ -f "$METADATA_FILE" ]; then
            VERSIONS=$(python -c "import json; m=json.load(open('$METADATA_FILE')); print(len(m['versions_analyzed']))")
            TOTAL_FILES=$(python -c "import json; m=json.load(open('$METADATA_FILE')); print(sum(m['files_per_version'].values()))")
            ELAPSED=$(python -c "import json; m=json.load(open('$METADATA_FILE')); print(m['elapsed_time_minutes'])")
            TOTAL_DUPS=$(python -c "import json; m=json.load(open('$METADATA_FILE')); print(m['overall_result'].get('total_duplicate_pairs', 'N/A'))")

            # Build version table
            VERSION_TABLE=$(python -c "
          import json
          m = json.load(open('$METADATA_FILE'))
          for v, count in m['files_per_version'].items():
              print(f'| {v} | {count} |')
          ")

            # Build consecutive pairs table
            PAIRS_TABLE=$(python -c "
          import json
          m = json.load(open('$METADATA_FILE'))
          for r in m['consecutive_pair_results']:
              print(f'| {r[\"version_a\"]} vs {r[\"version_b\"]} | {r[\"training_set_size\"]} | {r[\"training_duplicate_pairs\"]} | {r[\"test_set_size\"]} | {r[\"test_entries_with_leakage\"]} | {r[\"test_leakage_percentage\"]}% | {r[\"duplicate_pairs\"]} | {r[\"exact_duplicate_pairs\"]} |')
          ")

            cat >> $GITHUB_STEP_SUMMARY << EOF
          # Cross-Version Duplicate Analysis Report

          ## Configuration

          | Setting | Value |
          |---------|-------|
          | **Repository** | ${{ github.event.inputs.repo_url }} |
          | **Tag regex** | ${{ github.event.inputs.tag_regex }} |
          | **Versions analyzed** | ${VERSIONS} |
          | **Training mode** | Cumulative (each pair uses same model) |
          | **Threshold** | ${{ github.event.inputs.duplicate_threshold }} |
          | **Total time** | ${ELAPSED} minutes |
          | **Total duplicate pairs** | ${TOTAL_DUPS} |

          ## Files per Version

          | Version | Files |
          |---------|-------|
          ${VERSION_TABLE}
          | **Total** | **${TOTAL_FILES}** |

          ## Consecutive Version Pairs

          | Pair | Train Files | Train Dups | Test Files | Test Leakage | Leakage % | Consec. Dups | Exact Dups |
          |------|-------------|------------|------------|--------------|-----------|--------------|------------|
          ${PAIRS_TABLE}

          ## Artifacts

          Download the artifacts below for:
          - \`*_embeddings.csv\` - Per-pair embeddings
          - \`*_vs_*_duplicates.csv\` - Consecutive pair duplicate reports
          - \`*_train_duplicates.csv\` - Within-training duplicate pairs
          - \`*_leakage.csv\` - Train-test leakage pairs
          - \`*_finetuned.d2v\` - Final cumulative model
          - \`*_cross_version_metadata.json\` - Full metadata

          ---
          *Generated by [doc2vec-experiments](https://github.com/${{ github.repository }})*
          EOF
          else
            echo "## Cross-Version Analysis" >> $GITHUB_STEP_SUMMARY
            echo "Analysis did not complete successfully. Check logs for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-version-${{ steps.repo_name.outputs.repo_name }}
          path: |
            ${{ steps.repo_name.outputs.repo_name }}_*
          retention-days: 90
