name: Train Base Doc2Vec Model

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Programming language for popular repos'
        required: true
        default: 'java'
        type: choice
        options:
          - java
          - python
          - javascript
          - typescript
          - go
          - rust
          - cpp
          - csharp

      organization:
        description: 'GitHub organization to fetch repos from (e.g., "apache"). Leave empty for general popular repos.'
        required: false
        default: 'apache'
        type: string

      repo_count:
        description: 'Number of popular repos to use for base model (max 1k)'
        required: true
        default: '100'
        type: string

      file_extensions:
        description: 'File extensions (space-separated, e.g., ".java .scala")'
        required: true
        default: '.java'
        type: string

      vector_size:
        description: 'Embedding dimension size'
        required: false
        default: '200'
        type: string

      epochs:
        description: 'Training epochs'
        required: false
        default: '20'
        type: string

      min_stars:
        description: 'Minimum stars for repo selection (auto-adjusted for large counts)'
        required: false
        default: '500'
        type: string

      batch_size:
        description: 'Number of repos to process per batch'
        required: false
        default: '5'
        type: string

      max_docs_per_batch:
        description: 'Max documents per training sub-batch (memory limit)'
        required: false
        default: '5000'
        type: string

      parallel_workers:
        description: 'Number of parallel workers for processing'
        required: false
        default: '4'
        type: string

jobs:
  train-base-model:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max for large training jobs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Calculate optimal parameters
        id: params
        run: |
          # Auto-adjust min_stars based on repo count
          REPO_COUNT=${{ github.event.inputs.repo_count }}
          MIN_STARS=${{ github.event.inputs.min_stars }}

          if [ "$REPO_COUNT" -gt 200 ]; then
            MIN_STARS=$((MIN_STARS / 2))
          fi
          if [ "$REPO_COUNT" -gt 400 ]; then
            MIN_STARS=$((MIN_STARS / 4))
          fi

          # Ensure minimum threshold
          if [ "$MIN_STARS" -lt 50 ]; then
            MIN_STARS=50
          fi

          echo "min_stars=${MIN_STARS}" >> $GITHUB_OUTPUT
          echo "📊 Adjusted parameters:"
          echo "   Repo count: $REPO_COUNT"
          echo "   Min stars: $MIN_STARS"
          echo "   Batch size: ${{ github.event.inputs.batch_size }}"
          echo "   Parallel workers: ${{ github.event.inputs.parallel_workers }}"

      - name: Fetch popular repositories
        run: |
          ORG="${{ github.event.inputs.organization }}"
          if [ -n "$ORG" ]; then
            echo "🔍 Fetching top ${{ github.event.inputs.repo_count }} ${{ github.event.inputs.language }} repositories from $ORG..."
            python src/get_popular_repos.py \
              --language "${{ github.event.inputs.language }}" \
              --count "${{ github.event.inputs.repo_count }}" \
              --org "$ORG" \
              --output popular_repos.txt
          else
            echo "🔍 Fetching top ${{ github.event.inputs.repo_count }} ${{ github.event.inputs.language }} repositories..."
            echo "   Minimum stars: ${{ steps.params.outputs.min_stars }}"
            python src/get_popular_repos.py \
              --language "${{ github.event.inputs.language }}" \
              --count "${{ github.event.inputs.repo_count }}" \
              --min-stars "${{ steps.params.outputs.min_stars }}" \
              --output popular_repos.txt
          fi

          echo "📋 Repository list summary:"
          echo "   Total repos: $(wc -l < popular_repos.txt)"
          echo "   First 5 repos:"
          head -5 popular_repos.txt
          echo "   ..."
          echo "   Last 5 repos:"
          tail -5 popular_repos.txt

      - name: Setup swap space for large training
        run: |
          echo "🔧 Setting up additional swap space..."
          # Use different filename to avoid conflict with existing swap
          sudo fallocate -l 8G /swapfile2
          sudo chmod 600 /swapfile2
          sudo mkswap /swapfile2
          sudo swapon /swapfile2
          sudo swapon --show

      - name: Train base model
        run: |
          echo "🚀 Training base model on ${{ github.event.inputs.repo_count }} repositories..."
          echo "   This may take several hours for large datasets"

          python src/train_base_model.py \
            --repos popular_repos.txt \
            --ext ${{ github.event.inputs.file_extensions }} \
            --output "base_model_${{ github.event.inputs.language }}_${{ github.event.inputs.repo_count }}repos.d2v" \
            --vector-size ${{ github.event.inputs.vector_size }} \
            --epochs ${{ github.event.inputs.epochs }} \
            --batch-size ${{ github.event.inputs.batch_size }} \
            --max-docs-per-batch ${{ github.event.inputs.max_docs_per_batch }} \
            --parallel-workers ${{ github.event.inputs.parallel_workers }}

      - name: Write Job Summary
        if: always()
        run: |
          ORG="${{ github.event.inputs.organization }}"
          if [ -z "$ORG" ]; then
            ORG="General (top by stars)"
          fi

          MODEL_FILE="base_model_${{ github.event.inputs.language }}_${{ github.event.inputs.repo_count }}repos.json"

          # Extract metadata if available
          if [ -f "$MODEL_FILE" ]; then
            TOTAL_DOCS=$(python -c "import json; print(json.load(open('$MODEL_FILE')).get('total_documents', 'N/A'))")
            VOCAB_SIZE=$(python -c "import json; print(json.load(open('$MODEL_FILE')).get('vocab_size', 'N/A'))")
            UNIQUE_REPOS=$(python -c "import json; print(json.load(open('$MODEL_FILE')).get('unique_repos', 'N/A'))")
          else
            TOTAL_DOCS="N/A"
            VOCAB_SIZE="N/A"
            UNIQUE_REPOS="N/A"
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🎯 Base Model Training Report

          ## Configuration

          | Setting | Value |
          |---------|-------|
          | **Language** | ${{ github.event.inputs.language }} |
          | **Organization** | ${ORG} |
          | **Repositories** | ${{ github.event.inputs.repo_count }} |
          | **Vector size** | ${{ github.event.inputs.vector_size }} |
          | **Epochs** | ${{ github.event.inputs.epochs }} |
          | **Batch size** | ${{ github.event.inputs.batch_size }} repos |
          | **Max docs/batch** | ${{ github.event.inputs.max_docs_per_batch }} |

          ## Results

          | Metric | Value |
          |--------|-------|
          | Total documents | **${TOTAL_DOCS}** |
          | Vocabulary size | **${VOCAB_SIZE}** |
          | Unique repos trained | **${UNIQUE_REPOS}** |

          ## Artifacts

          Download \`base-model-${{ github.event.inputs.language }}-${{ github.event.inputs.repo_count }}repos\` for:
          - \`*.d2v\` - Doc2Vec model files
          - \`*.json\` - Training metadata
          - \`*.sample.csv\` - Sample embeddings

          ---
          *Generated by [doc2vec-experiments](https://github.com/${{ github.repository }})*
          EOF

      - name: Upload base model and metadata
        uses: actions/upload-artifact@v4
        with:
          name: base-model-${{ github.event.inputs.language }}-${{ github.event.inputs.repo_count }}repos
          path: |
            base_model_*
            popular_repos.txt
            training_report.txt
          retention-days: 90  # Keep for 90 days for fine-tuning